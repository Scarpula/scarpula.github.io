<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <defs>
    <radialGradient id="g6top" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.16"/><stop offset="60%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g6acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0b0710"/>
  <rect width="1280" height="720" fill="url(#g6top)"/>

  <text x="64" y="66" font-size="13" fill="#a78bfa" letter-spacing="3">ARCHITECTURE · CPU-ONLY, EU DATA RESIDENCY</text>
  <text x="64" y="104" font-size="32" font-weight="600" fill="#fafafa" letter-spacing="-0.5">A full discovery stack — no GPU until revenue</text>

  <!-- three layers -->
  <g transform="translate(64 142)">
    <!-- Frontend -->
    <g>
      <rect width="1152" height="108" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="24" y="36" font-size="12" fill="#a78bfa" letter-spacing="1.5">FRONTEND · VERCEL</text>
      <text x="24" y="66" font-size="16" font-weight="600" fill="#f4f4f5">Next.js 15 · React 19 · App Router · Tailwind v4 · 3Dmol.js · Paddle.js</text>
      <text x="24" y="90" font-size="12.5" fill="#9ca3af">app.molhub.bio dashboard · molecules · receptors · docking · copilot · billing — Sentry instrumented</text>
    </g>
    <!-- Backend -->
    <g transform="translate(0 124)">
      <rect width="1152" height="108" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#a78bfa" stroke-opacity="0.22"/>
      <text x="24" y="36" font-size="12" fill="#a78bfa" letter-spacing="1.5">COMPUTE · HETZNER FALKENSTEIN (EU)</text>
      <text x="24" y="66" font-size="16" font-weight="600" fill="#f4f4f5">FastAPI · Celery workers · RDKit · AutoDock Vina · Meeko · FPocket · OpenMM</text>
      <text x="24" y="90" font-size="12.5" fill="#9ca3af">21 OpenAPI endpoints · async docking / pocket / generation jobs · Caddy + Let's Encrypt · CPU-only by design</text>
    </g>
    <!-- Data / Auth -->
    <g transform="translate(0 248)">
      <rect width="566" height="108" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="24" y="36" font-size="12" fill="#a78bfa" letter-spacing="1.5">AUTH &amp; BILLING · SUPABASE (US-EAST)</text>
      <text x="24" y="66" font-size="15.5" font-weight="600" fill="#f4f4f5">Supabase Auth · RLS · profiles</text>
      <text x="24" y="90" font-size="12.5" fill="#9ca3af">.edu/.ac academic detection · Paddle webhook → plan upgrade</text>
    </g>
    <g transform="translate(586 248)">
      <rect width="566" height="108" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="24" y="36" font-size="12" fill="#6ee7b7" letter-spacing="1.5">OPEN-SCIENCE DATA</text>
      <text x="24" y="66" font-size="15.5" font-weight="600" fill="#f4f4f5">ChEMBL 2.9M · PubChem · AlphaFold 200M+</text>
      <text x="24" y="90" font-size="12.5" fill="#9ca3af">Enamine REAL / ZINC-22 · 37B+ buyable analogs · RCSB PDB</text>
    </g>
  </g>

  <!-- scale metrics -->
  <g transform="translate(64 528)">
    <text x="0" y="0" font-size="12" fill="#71717a" letter-spacing="1">VERIFIED SCALE</text>
    <g transform="translate(0 16)">
      <g><rect width="270" height="120" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="24" y="62" font-size="34" font-weight="600" fill="#fafafa" font-family="ui-monospace,monospace">2.9M</text>
        <text x="24" y="92" font-size="12.5" fill="#9ca3af">molecules indexed (Morgan-FP)</text></g>
      <g transform="translate(294 0)"><rect width="270" height="120" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="24" y="62" font-size="34" font-weight="600" fill="#fafafa" font-family="ui-monospace,monospace">&lt; 3 min</text>
        <text x="24" y="92" font-size="12.5" fill="#9ca3af">SMILES → Vina docking score</text></g>
      <g transform="translate(588 0)"><rect width="270" height="120" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="24" y="62" font-size="34" font-weight="600" fill="#6ee7b7" font-family="ui-monospace,monospace">~$190</text>
        <text x="24" y="92" font-size="12.5" fill="#9ca3af">fixed monthly OPEX ceiling</text></g>
      <g transform="translate(882 0)"><rect width="270" height="120" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="24" y="62" font-size="34" font-weight="600" fill="#fafafa" font-family="ui-monospace,monospace">$0</text>
        <text x="24" y="92" font-size="12.5" fill="#9ca3af">data-licence bills · open stack</text></g>
    </g>
  </g>
</svg>
