<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <defs>
    <radialGradient id="g2top" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/><stop offset="60%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g2acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="g2btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0b0710"/>
  <rect width="1280" height="720" fill="url(#g2top)"/>

  <!-- header -->
  <text x="64" y="68" font-size="13" fill="#a78bfa" letter-spacing="3">COPILOT · AUTONOMOUS CAMPAIGN</text>
  <text x="64" y="104" font-size="30" font-weight="600" fill="#fafafa" letter-spacing="-0.5">Tell it a goal → it designs, triages, and docks.</text>

  <!-- goal input -->
  <g transform="translate(64 130)">
    <rect x="0" y="0" width="1152" height="56" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#a78bfa" stroke-opacity="0.35"/>
    <circle cx="28" cy="28" r="5" fill="#c4b5fd"/>
    <text x="48" y="34" font-size="16" fill="#e4e4e7">"Design novel, synthesizable EGFR inhibitor leads."</text>
    <rect x="1028" y="11" width="110" height="34" rx="9" fill="url(#g2btn)"/>
    <text x="1083" y="33" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">Run campaign</text>
  </g>

  <!-- pipeline steps -->
  <g transform="translate(64 214)" font-size="12">
    <g>
      <rect x="0" y="0" width="218" height="34" rx="9" fill="#10b981" fill-opacity="0.10" stroke="#34d399" stroke-opacity="0.25"/>
      <text x="14" y="22" fill="#6ee7b7">✓ Resolve target · EGFR P00533</text>
    </g>
    <g transform="translate(234 0)">
      <rect x="0" y="0" width="232" height="34" rx="9" fill="#10b981" fill-opacity="0.10" stroke="#34d399" stroke-opacity="0.25"/>
      <text x="14" y="22" fill="#6ee7b7">✓ Pull 15 ChEMBL actives</text>
    </g>
    <g transform="translate(482 0)">
      <rect x="0" y="0" width="232" height="34" rx="9" fill="#10b981" fill-opacity="0.10" stroke="#34d399" stroke-opacity="0.25"/>
      <text x="14" y="22" fill="#6ee7b7">✓ Generate (BRICS) + triage</text>
    </g>
    <g transform="translate(730 0)">
      <rect x="0" y="0" width="200" height="34" rx="9" fill="#10b981" fill-opacity="0.10" stroke="#34d399" stroke-opacity="0.25"/>
      <text x="14" y="22" fill="#6ee7b7">✓ Auto-dock top picks (Vina)</text>
    </g>
    <g transform="translate(946 0)">
      <rect x="0" y="0" width="206" height="34" rx="9" fill="#8b5cf6" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.30"/>
      <text x="14" y="22" fill="#c4b5fd">→ Ranked shortlist + rationale</text>
    </g>
  </g>

  <!-- ranked candidate cards -->
  <text x="64" y="288" font-size="12" fill="#71717a" letter-spacing="1">RANKED CANDIDATES — novel molecules in no database, scored &amp; docked</text>
  <g transform="translate(64 304)">
    <!-- card template repeated -->
    <!-- card 1 -->
    <g transform="translate(0 0)">
      <rect width="276" height="156" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="16" y="16" width="244" height="58" rx="8" fill="#0d0818" stroke="#ffffff" stroke-opacity="0.05"/>
      <g stroke="#a78bfa" stroke-width="2.4" fill="none" transform="translate(138 45)" stroke-linecap="round" stroke-opacity="0.85">
        <polygon points="-44,0 -22,-13 0,0 0,13 -22,26 -44,13" fill="#a78bfa" fill-opacity="0.06"/>
        <line x1="0" y1="0" x2="22" y2="-13"/><circle cx="22" cy="-13" r="3" fill="#34d399" stroke="none"/>
        <line x1="22" y1="-13" x2="44" y2="0"/><line x1="44" y1="0" x2="44" y2="26"/>
      </g>
      <text x="16" y="98" font-size="13" font-weight="600" fill="#f4f4f5">Benzoyl-piperazine</text>
      <text x="16" y="118" font-size="11" fill="#71717a" font-family="ui-monospace,monospace">novel · 0 alerts</text>
      <g font-size="10" font-family="ui-monospace,monospace">
        <rect x="16" y="128" width="58" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.12"/><text x="45" y="141" fill="#c4b5fd" text-anchor="middle">QED 0.91</text>
        <rect x="80" y="128" width="50" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.12"/><text x="105" y="141" fill="#c4b5fd" text-anchor="middle">SA 1.4</text>
      </g>
      <text x="260" y="141" font-size="13" fill="#6ee7b7" text-anchor="end" font-family="ui-monospace,monospace">−7.5</text>
    </g>
    <!-- card 2 -->
    <g transform="translate(292 0)">
      <rect width="276" height="156" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="16" y="16" width="244" height="58" rx="8" fill="#0d0818" stroke="#ffffff" stroke-opacity="0.05"/>
      <g stroke="#e879f9" stroke-width="2.4" fill="none" transform="translate(138 45)" stroke-linecap="round" stroke-opacity="0.85">
        <polygon points="-40,-10 -18,-18 4,-8 2,16 -20,24 -42,14" fill="#e879f9" fill-opacity="0.06"/>
        <line x1="4" y1="-8" x2="26" y2="-16"/><circle cx="26" cy="-16" r="3" fill="#34d399" stroke="none"/>
        <line x1="26" y1="-16" x2="44" y2="-2"/>
      </g>
      <text x="16" y="98" font-size="13" font-weight="600" fill="#f4f4f5">Pyrrole-carboxamide</text>
      <text x="16" y="118" font-size="11" fill="#71717a" font-family="ui-monospace,monospace">novel · 0 alerts</text>
      <g font-size="10" font-family="ui-monospace,monospace">
        <rect x="16" y="128" width="58" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.12"/><text x="45" y="141" fill="#c4b5fd" text-anchor="middle">QED 0.88</text>
        <rect x="80" y="128" width="50" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.12"/><text x="105" y="141" fill="#c4b5fd" text-anchor="middle">SA 2.1</text>
      </g>
      <text x="260" y="141" font-size="13" fill="#6ee7b7" text-anchor="end" font-family="ui-monospace,monospace">−7.4</text>
    </g>
    <!-- card 3 -->
    <g transform="translate(584 0)">
      <rect width="276" height="156" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="16" y="16" width="244" height="58" rx="8" fill="#0d0818" stroke="#ffffff" stroke-opacity="0.05"/>
      <g stroke="#a78bfa" stroke-width="2.4" fill="none" transform="translate(138 45)" stroke-linecap="round" stroke-opacity="0.85">
        <polygon points="-42,4 -30,-16 -6,-18 8,-2 -2,18 -26,22" fill="#a78bfa" fill-opacity="0.06"/>
        <line x1="8" y1="-2" x2="30" y2="-10"/><circle cx="30" cy="-10" r="3" fill="#34d399" stroke="none"/>
        <line x1="-42" y1="4" x2="-58" y2="14"/>
      </g>
      <text x="16" y="98" font-size="13" font-weight="600" fill="#f4f4f5">Chloroaniline-piperazine</text>
      <text x="16" y="118" font-size="11" fill="#71717a" font-family="ui-monospace,monospace">novel · 0 alerts</text>
      <g font-size="10" font-family="ui-monospace,monospace">
        <rect x="16" y="128" width="58" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.12"/><text x="45" y="141" fill="#c4b5fd" text-anchor="middle">QED 0.85</text>
        <rect x="80" y="128" width="50" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.12"/><text x="105" y="141" fill="#c4b5fd" text-anchor="middle">SA 2.5</text>
      </g>
      <text x="260" y="141" font-size="13" fill="#6ee7b7" text-anchor="end" font-family="ui-monospace,monospace">−7.3</text>
    </g>
    <!-- card 4 -->
    <g transform="translate(876 0)">
      <rect width="276" height="156" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="16" y="16" width="244" height="58" rx="8" fill="#0d0818" stroke="#ffffff" stroke-opacity="0.05"/>
      <g stroke="#e879f9" stroke-width="2.4" fill="none" transform="translate(138 45)" stroke-linecap="round" stroke-opacity="0.85">
        <polygon points="-46,0 -24,-14 -2,-14 -2,14 -24,28 -46,14" fill="#e879f9" fill-opacity="0.06"/>
        <line x1="-2" y1="-14" x2="20" y2="-14"/><polygon points="20,-14 42,-14 42,12 20,12" fill="#a78bfa" fill-opacity="0.06"/>
        <circle cx="42" cy="-1" r="3" fill="#34d399" stroke="none"/>
      </g>
      <text x="16" y="98" font-size="13" font-weight="600" fill="#f4f4f5">1,4-Dibenzoylpiperazine</text>
      <text x="16" y="118" font-size="11" fill="#71717a" font-family="ui-monospace,monospace">novel · 0 alerts</text>
      <g font-size="10" font-family="ui-monospace,monospace">
        <rect x="16" y="128" width="58" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.12"/><text x="45" y="141" fill="#c4b5fd" text-anchor="middle">QED 0.92</text>
        <rect x="80" y="128" width="50" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.12"/><text x="105" y="141" fill="#c4b5fd" text-anchor="middle">SA 2.0</text>
      </g>
      <text x="260" y="141" font-size="13" fill="#6ee7b7" text-anchor="end" font-family="ui-monospace,monospace">−7.2</text>
    </g>
  </g>

  <!-- rationale footer -->
  <g transform="translate(64 500)">
    <rect width="1152" height="150" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="24" y="36" font-size="13" fill="#a78bfa" letter-spacing="1">RATIONALE — one line per candidate</text>
    <text x="24" y="68" font-size="14" fill="#d4d4d8">Diverse piperazine-amide chemotypes, reactive-motif &amp; PAINS/Brenk clean, SA 1.4–2.5,</text>
    <text x="24" y="92" font-size="14" fill="#d4d4d8">docked −7.2 to −7.5 kcal/mol — in range of erlotinib/gefitinib anchors docked alongside.</text>
    <text x="24" y="126" font-size="12" fill="#71717a">Honest framing: docking is a triage signal for prioritization, not a binding guarantee.</text>
  </g>
</svg>
