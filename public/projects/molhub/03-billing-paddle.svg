      <rect width="356" height="318" rx="18" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="28" y="44" font-size="15" font-weight="500" fill="#d4d4d8">Pro</text>
      <text x="28" y="92" font-size="40" font-weight="600" fill="#fafafa">$499</text>
      <text x="146" y="92" font-size="13" fill="#71717a">per month</text>
      <text x="28" y="116" font-size="12" fill="#71717a">Biotech teams</text>
      <g font-size="13.5" fill="#d4d4d8">
