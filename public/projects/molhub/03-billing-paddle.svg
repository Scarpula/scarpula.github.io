        <text x="48" y="186">200 campaigns + de-novo generation</text>
        <text x="48" y="216">Priority queue · team workspaces</text>
        <text x="48" y="246">API access · up to 5 seats</text>
        <g fill="#a78bfa"><text x="28" y="156">✓</text><text x="28" y="186">✓</text><text x="28" y="216">✓</text><text x="28" y="246">✓</text></g>
      </g>
      <rect x="28" y="266" width="300" height="38" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="178" y="291" font-size="13.5" font-weight="500" fill="#f4f4f5" text-anchor="middle">Choose Pro</text>
