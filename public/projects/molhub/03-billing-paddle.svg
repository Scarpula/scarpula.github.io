      <text x="92" y="32" font-size="14" font-weight="600" fill="#f4f4f5" text-anchor="middle">Paddle.js overlay</text>
      <text x="92" y="54" font-size="11.5" fill="#9ca3af" text-anchor="middle">dark theme checkout</text>
    </g>
    <g transform="translate(258 66)">
      <rect width="206" height="76" rx="12" fill="#0d0818" stroke="#a78bfa" stroke-opacity="0.25"/>
      <text x="103" y="32" font-size="14" font-weight="600" fill="#f4f4f5" text-anchor="middle">Paddle — Merchant</text>
      <text x="103" y="54" font-size="11.5" fill="#9ca3af" text-anchor="middle">of Record · VAT &amp; tax</text>
    </g>
    <g transform="translate(498 66)">
      <rect width="206" height="76" rx="12" fill="#0d0818" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="103" y="32" font-size="14" font-weight="600" fill="#f4f4f5" text-anchor="middle">Webhook → Supabase</text>
      <text x="103" y="54" font-size="11.5" fill="#9ca3af" text-anchor="middle">plan upgrade in DB</text>
    </g>
    <g transform="translate(738 66)">
      <rect width="184" height="76" rx="12" fill="#0d0818" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="92" y="32" font-size="14" font-weight="600" fill="#f4f4f5" text-anchor="middle">Instant quota bump</text>
      <text x="92" y="54" font-size="11.5" fill="#9ca3af" text-anchor="middle">tier unlocked in-app</text>
    </g>
    <g transform="translate(956 66)">
      <rect width="160" height="76" rx="12" fill="#10b981" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.30"/>
      <text x="80" y="32" font-size="14" font-weight="600" fill="#6ee7b7" text-anchor="middle">Payoneer USD</text>
      <text x="80" y="54" font-size="11.5" fill="#9ca3af" text-anchor="middle">payout account</text>
    </g>
    <!-- arrows -->
    <g stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1.6" fill="#a78bfa" fill-opacity="0.5">
      <line x1="224" y1="104" x2="256" y2="104"/><polygon points="256,104 248,100 248,108"/>
      <line x1="464" y1="104" x2="496" y2="104"/><polygon points="496,104 488,100 488,108"/>
      <line x1="704" y1="104" x2="736" y2="104"/><polygon points="736,104 728,100 728,108"/>
      <line x1="922" y1="104" x2="954" y2="104"/><polygon points="954,104 946,100 946,108"/>
    </g>
