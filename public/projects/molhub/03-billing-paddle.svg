    <!-- Basic (highlight) -->
    <g transform="translate(376 0)">
      <rect width="356" height="318" rx="18" fill="#8b5cf6" fill-opacity="0.07" stroke="#a78bfa" stroke-opacity="0.40"/>
      <rect x="28" y="-12" width="98" height="24" rx="12" fill="#8b5cf6"/>
      <text x="77" y="4" font-size="11" font-weight="500" fill="#ffffff" text-anchor="middle">Most popular</text>
      <text x="28" y="44" font-size="15" font-weight="500" fill="#d4d4d8">Basic</text>
      <text x="28" y="92" font-size="40" font-weight="600" fill="#fafafa">$99</text>
      <text x="128" y="92" font-size="13" fill="#71717a">per month</text>
      <text x="28" y="116" font-size="12" fill="#71717a">Independent researchers &amp; small labs</text>
      <g font-size="13.5" fill="#d4d4d8">
        <text x="48" y="156">30 docking jobs / mo</text>
        <text x="48" y="186">20 AI Copilot campaigns / mo</text>
        <text x="48" y="216">Batch screening · upload PDB/SMILES</text>
        <text x="48" y="246">CSV / SDF export</text>
        <g fill="#a78bfa"><text x="28" y="156">✓</text><text x="28" y="186">✓</text><text x="28" y="216">✓</text><text x="28" y="246">✓</text></g>
      </g>
