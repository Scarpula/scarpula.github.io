<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <defs>
    <radialGradient id="g3top" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/><stop offset="60%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g3btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g3acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0b0710"/>
  <rect width="1280" height="720" fill="url(#g3top)"/>

  <text x="640" y="66" font-size="13" fill="#a78bfa" letter-spacing="3" text-anchor="middle">REAL-PAYMENT SaaS · LIVE CHECKOUT</text>
  <text x="640" y="104" font-size="32" font-weight="600" fill="#fafafa" text-anchor="middle" letter-spacing="-0.5">Subscriptions that actually charge — Paddle MoR → Payoneer</text>

  <!-- pricing tiers -->
  <g transform="translate(64 150)">
    <!-- Academic -->
    <g transform="translate(0 0)">
      <rect width="356" height="318" rx="18" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="28" y="44" font-size="15" font-weight="500" fill="#d4d4d8">Academic</text>
      <text x="28" y="92" font-size="40" font-weight="600" fill="#fafafa">$0</text>
      <text x="120" y="92" font-size="13" fill="#71717a">free forever</text>
      <text x="28" y="116" font-size="12" fill="#71717a">.edu / .ac auto-verified</text>
      <g font-size="13.5" fill="#d4d4d8">
        <text x="48" y="156">25 docking jobs / mo</text>
        <text x="48" y="186">12 AI Copilot campaigns / mo</text>
        <text x="48" y="216">2.9M-molecule library &amp; search</text>
        <text x="48" y="246">3D viewer · pockets · NL query</text>
        <g fill="#a78bfa"><text x="28" y="156">✓</text><text x="28" y="186">✓</text><text x="28" y="216">✓</text><text x="28" y="246">✓</text></g>
      </g>
      <rect x="28" y="266" width="300" height="38" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="178" y="291" font-size="13.5" font-weight="500" fill="#f4f4f5" text-anchor="middle">Start free</text>
