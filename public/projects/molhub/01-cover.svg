<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <defs>
    <radialGradient id="glowTop" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="violetFuchsia" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/><stop offset="55%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="cardGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atom" cx="34%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="45%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="hub" cx="34%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#fae8ff"/><stop offset="40%" stop-color="#e879f9"/><stop offset="100%" stop-color="#a21caf"/>
    </radialGradient>
    <linearGradient id="bond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="#0b0710"/>
  <rect width="1280" height="720" fill="url(#glowTop)"/>
  <rect width="1280" height="720" fill="url(#glowR)"/>

  <!-- top nav -->
  <g transform="translate(64 44)">
    <g transform="translate(0 -14) scale(0.22)">
      <g transform="translate(64 64)">
        <g stroke="url(#bond)" stroke-width="6" stroke-linecap="round" fill="none">
          <path d="M0,-40 L34.6,-20 L34.6,20 L0,40 L-34.6,20 L-34.6,-20 Z"/>
          <line x1="0" y1="0" x2="0" y2="-40"/><line x1="0" y1="0" x2="34.6" y2="20"/><line x1="0" y1="0" x2="-34.6" y2="20"/>
        </g>
        <g fill="url(#atom)">
          <circle cx="0" cy="-40" r="7"/><circle cx="34.6" cy="-20" r="7"/><circle cx="34.6" cy="20" r="7"/>
          <circle cx="0" cy="40" r="7"/><circle cx="-34.6" cy="20" r="7"/><circle cx="-34.6" cy="-20" r="7"/>
        </g>
        <circle cx="-34.6" cy="-20" r="3.6" fill="#34d399"/>
        <circle cx="0" cy="0" r="10" fill="url(#hub)"/>
      </g>
    </g>
    <text x="40" y="6" font-size="22" font-weight="600" fill="#fafafa">MolHub</text>
    <text x="980" y="4" font-size="14" fill="#a1a1aa" text-anchor="end">Features   Blog   Pricing   Docs</text>
    <rect x="1010" y="-16" width="106" height="34" rx="10" fill="url(#btn)"/>
    <text x="1063" y="6" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">Start free</text>
  </g>
  <line x1="0" y1="74" x2="1280" y2="74" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- pill -->
  <g transform="translate(640 130)">
    <rect x="-168" y="0" width="336" height="32" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="-146" cy="16" r="4" fill="#c4b5fd"/>
    <text x="-128" y="21" font-size="13" fill="#d4d4d8">Natural-language molecular search is live</text>
  </g>

  <!-- headline -->
  <text x="640" y="232" font-size="60" font-weight="600" fill="#fafafa" text-anchor="middle" letter-spacing="-1.5">Drug discovery,</text>
  <text x="640" y="300" font-size="60" font-weight="600" fill="url(#violetFuchsia)" text-anchor="middle" letter-spacing="-1.5">in your browser.</text>

  <text x="640" y="346" font-size="18" fill="#a1a1aa" text-anchor="middle">A 2.9-million-compound library, any protein from AlphaFold, and 37B buyable analogs —</text>
  <text x="640" y="372" font-size="18" fill="#a1a1aa" text-anchor="middle">screen, dock, and triage. No cluster, no licenses. SMILES → docking score in under 3 minutes.</text>

  <!-- CTAs -->
  <g transform="translate(640 410)">
    <rect x="-150" y="0" width="150" height="44" rx="12" fill="url(#btn)"/>
    <text x="-75" y="28" font-size="15" font-weight="500" fill="#ffffff" text-anchor="middle">Start free  →</text>
    <rect x="8" y="0" width="142" height="44" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="79" y="28" font-size="15" font-weight="500" fill="#f4f4f5" text-anchor="middle">Open the app</text>
  </g>
  <text x="640" y="486" font-size="12" fill="#71717a" text-anchor="middle">Free academic tier · No credit card</text>

  <!-- product preview card -->
  <g transform="translate(290 512)">
    <rect x="-30" y="-20" width="760" height="230" rx="24" fill="url(#cardGlow)"/>
    <rect x="0" y="0" width="700" height="188" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.10"/>
    <!-- window bar -->
    <circle cx="22" cy="22" r="5" fill="#fb7185" fill-opacity="0.7"/>
    <circle cx="40" cy="22" r="5" fill="#fbbf24" fill-opacity="0.7"/>
    <circle cx="58" cy="22" r="5" fill="#34d399" fill-opacity="0.7"/>
    <text x="80" y="26" font-size="12" fill="#71717a" font-family="ui-monospace, monospace">app.molhub.bio/docking/batch</text>
    <line x1="0" y1="44" x2="700" y2="44" stroke="#ffffff" stroke-opacity="0.05"/>

    <!-- leaderboard -->
    <text x="22" y="72" font-size="11" fill="#71717a" letter-spacing="1">BATCH SCREEN · EGFR (1M17)</text>
    <g font-family="ui-monospace, monospace">
      <!-- row 1 -->
      <g transform="translate(22 84)">
        <rect x="0" y="0" width="430" height="26" rx="6" fill="#ffffff" fill-opacity="0.02"/>
        <text x="10" y="18" font-size="12" fill="#52525b">1</text>
        <text x="28" y="18" font-size="13" fill="#e4e4e7" font-family="-apple-system, sans-serif">Gefitinib</text>
        <rect x="98" y="4" width="34" height="18" rx="4" fill="#10b981" fill-opacity="0.15" stroke="#34d399" stroke-opacity="0.25"/>
        <text x="115" y="17" font-size="10" fill="#6ee7b7" text-anchor="middle">best</text>
        <text x="424" y="18" font-size="13" fill="#6ee7b7" text-anchor="end">−7.71 kcal/mol</text>
      </g>
      <g transform="translate(22 114)">
        <text x="10" y="18" font-size="12" fill="#52525b">2</text>
        <text x="28" y="18" font-size="13" fill="#e4e4e7" font-family="-apple-system, sans-serif">Erlotinib</text>
        <text x="424" y="18" font-size="13" fill="#6ee7b7" text-anchor="end">−7.42 kcal/mol</text>
      </g>
      <g transform="translate(22 144)">
        <text x="10" y="18" font-size="12" fill="#52525b">3</text>
        <text x="28" y="18" font-size="13" fill="#a1a1aa" font-family="-apple-system, sans-serif">CHEMBL325894</text>
        <text x="424" y="18" font-size="13" fill="#6ee7b7" text-anchor="end">−7.39 kcal/mol</text>
      </g>
      <line x1="22" y1="138" x2="452" y2="138" stroke="#ffffff" stroke-opacity="0.05"/>
    </g>

    <!-- 3D pose panel -->
    <rect x="474" y="56" width="206" height="116" rx="12" fill="#0d0818" stroke="#ffffff" stroke-opacity="0.05"/>
    <g transform="translate(577 100) scale(0.42)">
      <g transform="translate(0 0)">
        <g stroke="url(#bond)" stroke-width="6" stroke-linecap="round" fill="none">
          <path d="M0,-40 L34.6,-20 L34.6,20 L0,40 L-34.6,20 L-34.6,-20 Z"/>
          <line x1="0" y1="0" x2="0" y2="-40"/><line x1="0" y1="0" x2="34.6" y2="20"/><line x1="0" y1="0" x2="-34.6" y2="20"/>
        </g>
        <g fill="url(#atom)">
          <circle cx="0" cy="-40" r="7"/><circle cx="34.6" cy="-20" r="7"/><circle cx="34.6" cy="20" r="7"/>
          <circle cx="0" cy="40" r="7"/><circle cx="-34.6" cy="20" r="7"/><circle cx="-34.6" cy="-20" r="7"/>
        </g>
        <circle cx="-34.6" cy="-20" r="3.6" fill="#34d399"/>
        <circle cx="0" cy="0" r="10" fill="url(#hub)"/>
      </g>
    </g>
    <text x="577" y="160" font-size="11" fill="#71717a" text-anchor="middle">3D pose · contact residues</text>
  </g>

  <!-- trust strip -->
  <text x="640" y="700" font-size="12" fill="#52525b" text-anchor="middle" letter-spacing="1.5">BUILT ON OPEN SCIENCE  ·  ChEMBL  ·  PubChem  ·  AlphaFold  ·  Enamine REAL  ·  ZINC-22  ·  RDKit  ·  AutoDock Vina</text>
</svg>
